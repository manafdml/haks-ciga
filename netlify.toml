# Netlify config — only used if you choose Netlify over Vercel.
# (You can delete this file if deploying to Vercel.)

[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options    = "nosniff"
    X-Frame-Options           = "SAMEORIGIN"
    Referrer-Policy           = "strict-origin-when-cross-origin"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/config.js"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

[[headers]]
  for = "/js/app.js"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/js/cigarettes.js"
  [headers.values]
    Cache-Control = "public, max-age=3600"
